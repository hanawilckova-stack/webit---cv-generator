<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web IT – CV Generator</title>

  <!-- Google Fonts: Space Grotesk + Oxanium -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Oxanium:wght@400;600;700&display=swap" rel="stylesheet" />


  <style>
    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
      background: #fff;
      color: #1a1a1a;
      font-size: 14px;
    }

    /* ============================================================
       LAYOUT: SPLIT SCREEN
    ============================================================ */
    #form-panel {
      width: 42%;
      overflow-y: auto;
      padding: 24px 20px;
      border-right: 1px solid #E0E0E0;
      background: #f7f7f7;
    }

    #preview-panel {
      width: 58%;
      overflow-y: auto;
      padding: 24px;
      background: #e8e8e8;
    }

    /* ============================================================
       FORM STYLES
    ============================================================ */
    .form-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .form-header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
    }

    #btn-export {
      background: #F63147;
      color: #fff;
      border: none;
      padding: 9px 18px;
      border-radius: 6px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    #btn-export:hover {
      background: #d4203a;
    }

    .form-section {
      margin-bottom: 20px;
    }

    .form-section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #E0E0E0;
    }

    .form-row {
      margin-bottom: 8px;
    }

    .form-row label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #666;
      margin-bottom: 3px;
    }

    .form-row input,
    .form-row textarea,
    .form-row select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      background: #fff;
      color: #1a1a1a;
      outline: none;
    }

    .form-row input:focus,
    .form-row textarea:focus {
      border-color: #F63147;
    }

    .form-row textarea {
      resize: vertical;
      min-height: 60px;
    }

    /* Dynamic item cards */
    .dynamic-item {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
    }

    .dynamic-item-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .dynamic-item-header input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      outline: none;
    }

    .dynamic-item-header input:focus {
      border-color: #F63147;
    }

    .btn-remove {
      background: none;
      border: 1px solid #ddd;
      color: #999;
      width: 26px;
      height: 26px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-remove:hover {
      border-color: #F63147;
      color: #F63147;
    }

    .btn-add {
      background: none;
      border: 1px dashed #bbb;
      color: #888;
      padding: 6px 12px;
      border-radius: 5px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      cursor: pointer;
      width: 100%;
      margin-top: 4px;
    }

    .btn-add:hover {
      border-color: #F63147;
      color: #F63147;
    }

    .btn-add-bullet {
      background: none;
      border: 1px dashed #ddd;
      color: #aaa;
      padding: 4px 10px;
      border-radius: 4px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      cursor: pointer;
      width: 100%;
      margin-top: 4px;
    }

    .btn-add-bullet:hover {
      border-color: #F63147;
      color: #F63147;
    }

    .bullet-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .bullet-row input {
      flex: 1;
      padding: 5px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      outline: none;
    }

    .bullet-row input:focus {
      border-color: #F63147;
    }

    .lang-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .lang-row input {
      flex: 1;
      padding: 6px 9px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      outline: none;
    }

    .lang-row input:focus {
      border-color: #F63147;
    }

    /* ============================================================
       PREVIEW: A4 DOCUMENT
    ============================================================ */
    #preview {
      background: #fff;
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      padding: 32px 40px 80px 40px; /* bottom padding for footer space */
      box-sizing: border-box;
      box-shadow: 0 2px 20px rgba(0,0,0,0.18);
      position: relative;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      line-height: 1.5;
      color: #1a1a1a;
    }

    /* ============================================================
       PREVIEW: HEADER
    ============================================================ */
    .cv-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .cv-name {
      font-size: 43px;
      font-weight: 700;
      font-family: 'Oxanium', sans-serif;
      color: #111E2D;
      line-height: 1;
      margin-right: 4px;
    }

    .cv-role-badge {
      background: #F63147;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      font-family: 'Oxanium', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 4px 10px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .cv-experience {
      color: #F63147;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Oxanium', sans-serif;
      white-space: nowrap;
    }

    /* ============================================================
       PREVIEW: SECTION BOX
    ============================================================ */
    .cv-section {
      background: #F7F7F7;
      border: none;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    /* Info box (Dostupnost…) — pouze tato sekce má border, žádný fill */
    .cv-section.cv-section--info {
      background: #fff;
      border: 1px solid #E0E0E0;
    }

    .cv-section-title {
      font-size: 15px;
      font-weight: 700;
      font-family: 'Oxanium', sans-serif;
      color: #111E2D;
      margin-bottom: 12px;
    }

    /* ============================================================
       PREVIEW: INFO BOX
    ============================================================ */
    .cv-info-table {
      width: 100%;
      border-collapse: collapse;
    }

    .cv-info-table td {
      padding: 6.5px 0;
      vertical-align: top;
    }

    .cv-info-label {
      color: #677489;
      font-size: 12px;
      font-weight: 700;
      width: 195px;
      padding-right: 12px;
    }

    .cv-info-value {
      color: #1a1a1a;
      font-size: 12px;
      font-weight: 700;
    }

    /* ============================================================
       PREVIEW: SKILLS
    ============================================================ */
    .cv-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .cv-tag {
      background: #E5E5E5;
      border: none;
      border-radius: 6px;
      padding: 3px 9px;
      font-size: 11px;
      font-weight: 700;
      font-family: 'Oxanium', sans-serif;
      color: #111E2D;
    }

    .cv-skills-row {
      display: flex;
      align-items: flex-start;
      margin-bottom: 10px;
      gap: 0;
    }

    .cv-skills-label {
      color: #677489;
      font-size: 12px;
      font-weight: 700;
      width: 195px;
      flex-shrink: 0;
      padding-right: 14px;
    }

    .cv-skills-value {
      color: #1a1a1a;
      font-size: 12px;
      font-weight: 400;
      flex: 1;
    }

    /* ============================================================
       PREVIEW: LANGUAGES
    ============================================================ */
    .cv-lang-row {
      display: flex;
      align-items: baseline;
      margin-bottom: 3px;
      gap: 6px;
    }

    .cv-lang-name {
      font-weight: 700;
      font-size: 12px;
      color: #1a1a1a;
    }

    .cv-lang-name::after {
      content: ':';
    }

    .cv-lang-level {
      font-size: 12px;
      font-weight: 400;
      color: #1a1a1a;
    }

    .cv-lang-section-label {
      color: #677489;
      font-size: 12px;
      font-weight: 700;
      width: 195px;
      flex-shrink: 0;
      padding-top: 1px;
      padding-right: 14px;
    }

    .cv-lang-list {
      flex: 1;
    }

    /* ============================================================
       PREVIEW: WORK EXPERIENCE
    ============================================================ */
    .cv-work-item {
      display: flex;
      align-items: flex-start;
      gap: 0;
      margin-bottom: 10px;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .cv-work-item:last-child {
      margin-bottom: 0;
    }

    .cv-work-position {
      width: 195px;
      flex-shrink: 0;
      padding-top: 2px;
      padding-right: 14px;
    }

    .cv-work-position-badge {
      background: #E5E5E5;
      border: none;
      border-radius: 6px;
      padding: 3px 9px;
      font-size: 11px;
      font-weight: 700;
      font-family: 'Oxanium', sans-serif;
      color: #111E2D;
      white-space: nowrap;
      display: inline-block;
    }

    .cv-work-bullets {
      flex: 1;
      padding-top: 2px;
    }

    .cv-work-bullets ul {
      list-style: disc;
      list-style-position: inside;
      padding-left: 0;
      margin: 0;
    }

    .cv-work-bullets ul li {
      font-size: 12px;
      color: #1a1a1a;
      margin-bottom: 2px;
      line-height: 1.45;
    }

    /* ============================================================
       PREVIEW: PERSONAL SKILLS
    ============================================================ */
    .cv-personal-text {
      font-size: 12px;
      color: #1a1a1a;
      line-height: 1.5;
    }

    /* ============================================================
       PREVIEW: EDUCATION
    ============================================================ */
    .cv-edu-item {
      display: flex;
      align-items: flex-start;
      gap: 0;
      margin-bottom: 10px;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .cv-edu-item:last-child {
      margin-bottom: 0;
    }

    .cv-edu-years {
      color: #677489;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
      width: 195px;
      padding-right: 14px;
    }

    .cv-edu-details {
      flex: 1;
    }

    .cv-edu-institution {
      font-size: 12px;
      font-weight: 400;
      color: #1a1a1a;
      margin-bottom: 2px;
      line-height: 1.45;
    }

    .cv-edu-degree {
      font-size: 12px;
      font-weight: 400;
      color: #1a1a1a;
      line-height: 1.45;
    }

    /* ============================================================
       PAGE BREAK INDICATOR
    ============================================================ */
    .page-break-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 0;
      border-top: 2px dashed #F63147;
      opacity: 0.4;
      pointer-events: none;
      z-index: 100;
    }

    .page-break-line::after {
      content: 'Konec stránky';
      position: absolute;
      right: 0;
      top: 3px;
      font-size: 10px;
      color: #F63147;
      font-family: 'Space Grotesk', sans-serif;
    }

    /* ============================================================
       PREVIEW: FOOTER
    ============================================================ */
    .cv-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 14px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
    }

    .cv-footer-logo {
      display: flex;
      align-items: center;
    }

    .cv-footer-contacts {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .cv-footer-contact-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: #111E2D;
    }

    .cv-footer-contact-item svg {
      flex-shrink: 0;
    }

    /* ============================================================
       PRINT / PDF EXPORT
    ============================================================ */
    @media print {
      @page {
        size: A4;
        /* margin-top: 32px = mezera nahoře na KAŽDÉ stránce (včetně první).
           Ostatní strany nulové — browser URL a čísla stránek se nevejdou
           do 32px a zůstanou skryté.                                       */
        margin: 32px 0 0 0;
      }

      /* Zachovej barvy a pozadí */
      *, *::before, *::after {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      body {
        display: block;
        height: auto;
        overflow: visible;
      }

      #form-panel           { display: none !important; }
      .page-break-line      { display: none !important; }

      #preview-panel {
        width: 100% !important;
        padding: 0 !important;
        overflow: visible !important;
        background: none !important;
        height: auto !important;
      }

      #preview {
        box-shadow: none !important;
        box-sizing: border-box !important;
        margin: 0 !important;
        width: 210mm !important;
        min-height: auto !important;
        /* Horní mezeru zajišťuje @page margin: 32px — zde 0 */
        padding-top: 0 !important;
        padding-left: 40px !important;
        padding-right: 40px !important;
        padding-bottom: 80px !important; /* footer (~48px) + 32px mezera */
      }

      /* Footer fixovaný na spodku každé stránky */
      .cv-footer {
        position: fixed !important;
        bottom: 0 !important;
        left: 0 !important;
        right: 0 !important;
      }

      /* ── JOB ITEM: nedělitelný ───────────────────────────────────
         Pracovní pozice se nikdy nerozdělí uprostřed.
         JS přidá break-before: page pokud se nevejde na stránku.
         CSS break-inside: avoid je záloha pro prohlížeč.
      ─────────────────────────────────────────────────────────── */
      .cv-work-item {
        break-inside: avoid;
        page-break-inside: avoid;
      }

      /* ── ATOMICKÉ SEKCE: nikdy se nerozdělí ─────────────────────
         Info box, skills, osobnostní dovednosti, vzdělání.
         JS přidá break-before: page pokud se nevejdou na stránku.
         CSS break-inside: avoid zabrání jejich rozříznutí.
      ─────────────────────────────────────────────────────────── */
      #prev-info-section,
      #prev-skills-section,
      #prev-personal-section,
      #prev-edu-section {
        break-inside: avoid;
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body>

<!-- ============================================================
     FORM PANEL (LEFT)
============================================================ -->
<div id="form-panel">

  <div class="form-header">
    <h1>CV Generator</h1>
    <button id="btn-export">Exportovat PDF</button>
  </div>

  <!-- HEADER INFO -->
  <div class="form-section">
    <div class="form-section-title">Základní informace</div>
    <div class="form-row">
      <label>Křestní jméno</label>
      <input type="text" id="f-name" placeholder="např. Lukáš" />
    </div>
    <div class="form-row">
      <label>Role / Pozice</label>
      <input type="text" id="f-role" placeholder="např. PHP DEVELOPER" />
    </div>
    <div class="form-row">
      <label>Léta zkušeností</label>
      <input type="text" id="f-exp" placeholder="např. 11+ let zkušeností" />
    </div>
  </div>

  <!-- INFO BOX -->
  <div class="form-section">
    <div class="form-section-title">Info box</div>
    <div class="form-row">
      <label>Dostupnost</label>
      <input type="text" id="f-dostupnost" placeholder="např. Až 160 hodin měsíčně" />
    </div>
    <div class="form-row">
      <label>Forma spolupráce</label>
      <input type="text" id="f-forma" placeholder="např. IČO" />
    </div>
    <div class="form-row">
      <label>Lokalita</label>
      <input type="text" id="f-lokalita" placeholder="např. Praha/Brno/remote" />
    </div>
    <div class="form-row">
      <label>Typ spolupráce</label>
      <input type="text" id="f-typ" placeholder="např. Remote/hybrid" />
    </div>
    <div class="form-row">
      <label>MD rate</label>
      <input type="text" id="f-rate" placeholder="např. 8 000 Kč" />
    </div>
  </div>

  <!-- SKILLS -->
  <div class="form-section">
    <div class="form-section-title">Odborné dovednosti</div>
    <div class="form-row">
      <label>Hlavní skills (oddělte čárkou)</label>
      <input type="text" id="f-skills" placeholder="PHP, HTML 5, XML, CSS 3…" />
    </div>
    <div class="form-row">
      <label>Databázové systémy</label>
      <input type="text" id="f-db" placeholder="např. SQL, MySQL" />
    </div>
    <div class="form-row">
      <label>Další</label>
      <input type="text" id="f-dalsi" placeholder="např. Git, Linux, Docker…" />
    </div>
  </div>

  <!-- LANGUAGES -->
  <div class="form-section">
    <div class="form-section-title">Jazykové znalosti</div>
    <div id="lang-list"></div>
    <button class="btn-add" id="btn-add-lang">+ Přidat jazyk</button>
  </div>

  <!-- WORK EXPERIENCE -->
  <div class="form-section">
    <div class="form-section-title">Pracovní zkušenosti</div>
    <div id="work-list"></div>
    <button class="btn-add" id="btn-add-work">+ Přidat zkušenost</button>
  </div>

  <!-- PERSONAL SKILLS -->
  <div class="form-section">
    <div class="form-section-title">Osobnostní dovednosti</div>
    <div class="form-row">
      <textarea id="f-personal" placeholder="např. Analytické a komunikační schopnosti, zodpovědnost, proaktivita"></textarea>
    </div>
  </div>

  <!-- EDUCATION -->
  <div class="form-section">
    <div class="form-section-title">Vzdělání</div>
    <div id="edu-list"></div>
    <button class="btn-add" id="btn-add-edu">+ Přidat vzdělání</button>
  </div>

</div><!-- /form-panel -->


<!-- ============================================================
     PREVIEW PANEL (RIGHT)
============================================================ -->
<div id="preview-panel">
  <div id="preview">

    <!-- HEADER -->
    <div class="cv-header" id="prev-header"></div>

    <!-- INFO BOX -->
    <div class="cv-section cv-section--info" id="prev-info-section">
      <table class="cv-info-table" id="prev-info-table"></table>
    </div>

    <!-- SKILLS -->
    <div class="cv-section" id="prev-skills-section">
      <div class="cv-section-title">Odborné dovednosti a znalosti</div>
      <div class="cv-tags" id="prev-tags"></div>
      <div id="prev-db-row" class="cv-skills-row">
        <span class="cv-skills-label">Databázové systémy</span>
        <span class="cv-skills-value" id="prev-db-val"></span>
      </div>
      <div id="prev-dalsi-row" class="cv-skills-row">
        <span class="cv-skills-label">Další</span>
        <span class="cv-skills-value" id="prev-dalsi-val"></span>
      </div>
      <div id="prev-lang-row" class="cv-skills-row">
        <span class="cv-lang-section-label">Jazykové znalosti</span>
        <div class="cv-lang-list" id="prev-lang-list"></div>
      </div>
    </div>

    <!-- WORK EXPERIENCE -->
    <div class="cv-section" id="prev-work-section">
      <div class="cv-section-title">Pracovní zkušenosti</div>
      <div id="prev-work-list"></div>
    </div>

    <!-- PERSONAL SKILLS -->
    <div class="cv-section" id="prev-personal-section">
      <div class="cv-section-title">Osobnostní dovednosti</div>
      <div class="cv-personal-text" id="prev-personal-text"></div>
    </div>

    <!-- EDUCATION -->
    <div class="cv-section" id="prev-edu-section">
      <div class="cv-section-title">Vzdělání</div>
      <div id="prev-edu-list"></div>
    </div>

    <!-- FOOTER -->
    <div class="cv-footer">
      <!-- Logo -->
      <div class="cv-footer-logo">
        <svg width="80" height="23" viewBox="0 0 80 23" fill="none" xmlns="http://www.w3.org/2000/svg">

<script>
  /* ============================================================
     STATE: dynamic items
  ============================================================ */
  let languages = [];
  let workItems = [];
  let eduItems  = [];

  let langId = 0;
  let workId = 0;
  let eduId  = 0;

  /* ============================================================
     HELPERS
  ============================================================ */
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ============================================================
     RENDER FORM: LANGUAGES
  ============================================================ */
  function renderLangForm() {
    const container = document.getElementById('lang-list');
    container.innerHTML = '';
    languages.forEach(lang => {
      const div = document.createElement('div');
      div.className = 'lang-row';
      div.innerHTML = `
        <input type="text" placeholder="Jazyk" value="${escHtml(lang.name)}" data-id="${lang.id}" data-field="name" />
        <input type="text" placeholder="Úroveň" value="${escHtml(lang.level)}" data-id="${lang.id}" data-field="level" style="max-width:100px"/>
        <button class="btn-remove" data-id="${lang.id}" data-type="lang">×</button>
      `;
      container.appendChild(div);
    });
    bindDynamicEvents();
  }

  /* ============================================================
     RENDER FORM: WORK EXPERIENCE
  ============================================================ */
  function renderWorkForm() {
    const container = document.getElementById('work-list');
    container.innerHTML = '';
    workItems.forEach(item => {
      const div = document.createElement('div');
      div.className = 'dynamic-item';
      let bulletsHtml = item.bullets.map(b => `
        <div class="bullet-row">
          <input type="text" placeholder="Popis…" value="${escHtml(b.text)}" data-wid="${item.id}" data-bid="${b.id}" data-field="bullet" />
          <button class="btn-remove" data-wid="${item.id}" data-bid="${b.id}" data-type="bullet">×</button>
        </div>
      `).join('');
      div.innerHTML = `
        <div class="dynamic-item-header">
          <input type="text" placeholder="Název pozice" value="${escHtml(item.position)}" data-id="${item.id}" data-field="work-position" />
          <button class="btn-remove" data-id="${item.id}" data-type="work">×</button>
        </div>
        <div class="bullet-list" data-wid="${item.id}">${bulletsHtml}</div>
        <button class="btn-add-bullet" data-id="${item.id}" data-type="add-bullet">+ Přidat bullet point</button>
      `;
      container.appendChild(div);
    });
    bindDynamicEvents();
  }

  /* ============================================================
     RENDER FORM: EDUCATION
  ============================================================ */
  function renderEduForm() {
    const container = document.getElementById('edu-list');
    container.innerHTML = '';
    eduItems.forEach(item => {
      const div = document.createElement('div');
      div.className = 'dynamic-item';
      div.innerHTML = `
        <div class="dynamic-item-header">
          <input type="text" placeholder="Časové rozmezí (např. 2018 - 2020)" value="${escHtml(item.years)}" data-id="${item.id}" data-field="edu-years" />
          <button class="btn-remove" data-id="${item.id}" data-type="edu">×</button>
        </div>
        <div class="form-row" style="margin-bottom:4px">
          <input type="text" placeholder="Instituce" value="${escHtml(item.institution)}" data-id="${item.id}" data-field="edu-institution" style="padding:5px 8px;font-size:12px" />
        </div>
        <div class="form-row">
          <input type="text" placeholder="Obor / Titul" value="${escHtml(item.degree)}" data-id="${item.id}" data-field="edu-degree" style="padding:5px 8px;font-size:12px" />
        </div>
      `;
      container.appendChild(div);
    });
    bindDynamicEvents();
  }

  /* ============================================================
     BIND DYNAMIC EVENTS
  ============================================================ */
  function bindDynamicEvents() {
    // Remove buttons
    document.querySelectorAll('.btn-remove').forEach(btn => {
      btn.onclick = (e) => {
        const type = btn.dataset.type;
        if (type === 'lang') {
          languages = languages.filter(l => l.id != btn.dataset.id);
          renderLangForm();
        } else if (type === 'work') {
          workItems = workItems.filter(w => w.id != btn.dataset.id);
          renderWorkForm();
        } else if (type === 'bullet') {
          const wi = workItems.find(w => w.id == btn.dataset.wid);
          if (wi) wi.bullets = wi.bullets.filter(b => b.id != btn.dataset.bid);
          renderWorkForm();
        } else if (type === 'edu') {
          eduItems = eduItems.filter(ed => ed.id != btn.dataset.id);
          renderEduForm();
        }
        updatePreview();
      };
    });

    // Add bullet
    document.querySelectorAll('[data-type="add-bullet"]').forEach(btn => {
      btn.onclick = () => {
        const wi = workItems.find(w => w.id == btn.dataset.id);
        if (wi) { wi.bullets.push({ id: Date.now(), text: '' }); renderWorkForm(); }
      };
    });

    // Input changes — languages
    document.querySelectorAll('[data-field="name"], [data-field="level"]').forEach(input => {
      input.oninput = () => {
        const lang = languages.find(l => l.id == input.dataset.id);
        if (lang) lang[input.dataset.field] = input.value;
        updatePreview();
      };
    });

    // Input changes — work position
    document.querySelectorAll('[data-field="work-position"]').forEach(input => {
      input.oninput = () => {
        const wi = workItems.find(w => w.id == input.dataset.id);
        if (wi) wi.position = input.value;
        updatePreview();
      };
    });

    // Input changes — bullets
    document.querySelectorAll('[data-field="bullet"]').forEach(input => {
      input.oninput = () => {
        const wi = workItems.find(w => w.id == input.dataset.wid);
        if (wi) {
          const b = wi.bullets.find(b => b.id == input.dataset.bid);
          if (b) b.text = input.value;
        }
        updatePreview();
      };
    });

    // Input changes — education
    document.querySelectorAll('[data-field^="edu-"]').forEach(input => {
      input.oninput = () => {
        const ei = eduItems.find(e => e.id == input.dataset.id);
        if (ei) {
          const key = input.dataset.field.replace('edu-', '');
          ei[key] = input.value;
        }
        updatePreview();
      };
    });
  }

  /* ============================================================
     ADD BUTTONS
  ============================================================ */
  document.getElementById('btn-add-lang').onclick = () => {
    languages.push({ id: ++langId, name: '', level: '' });
    renderLangForm();
    updatePreview();
  };

  document.getElementById('btn-add-work').onclick = () => {
    workItems.push({ id: ++workId, position: '', bullets: [{ id: Date.now(), text: '' }] });
    renderWorkForm();
    updatePreview();
  };

  document.getElementById('btn-add-edu').onclick = () => {
    eduItems.push({ id: ++eduId, years: '', institution: '', degree: '' });
    renderEduForm();
    updatePreview();
  };

  /* ============================================================
     STATIC INPUT LISTENERS
  ============================================================ */
  const staticIds = ['f-name','f-role','f-exp','f-dostupnost','f-forma','f-lokalita','f-typ','f-rate','f-skills','f-db','f-dalsi','f-personal'];
  staticIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', updatePreview);
  });

  /* ============================================================
     UPDATE PREVIEW
  ============================================================ */
  function updatePreview() {
    const name     = document.getElementById('f-name').value.trim();
    const role     = document.getElementById('f-role').value.trim();
    const exp      = document.getElementById('f-exp').value.trim();
    const dostup   = document.getElementById('f-dostupnost').value.trim();
    const forma    = document.getElementById('f-forma').value.trim();
    const lok      = document.getElementById('f-lokalita').value.trim();
    const typ      = document.getElementById('f-typ').value.trim();
    const rate     = document.getElementById('f-rate').value.trim();
    const skills   = document.getElementById('f-skills').value.trim();
    const db       = document.getElementById('f-db').value.trim();
    const dalsi    = document.getElementById('f-dalsi').value.trim();
    const personal = document.getElementById('f-personal').value.trim();

    /* --- HEADER --- */
    const header = document.getElementById('prev-header');
    header.innerHTML = '';
    if (name) {
      const nameEl = document.createElement('span');
      nameEl.className = 'cv-name';
      nameEl.textContent = name;
      header.appendChild(nameEl);
    }
    if (role) {
      const badge = document.createElement('span');
      badge.className = 'cv-role-badge';
      badge.textContent = role.toUpperCase();
      header.appendChild(badge);
    }
    if (exp) {
      const expEl = document.createElement('span');
      expEl.className = 'cv-experience';
      expEl.textContent = exp.toUpperCase();
      header.appendChild(expEl);
    }

    /* --- INFO BOX --- */
    const infoSection = document.getElementById('prev-info-section');
    const infoTable   = document.getElementById('prev-info-table');
    const infoRows = [
      { label: 'Dostupnost',       value: dostup },
      { label: 'Forma spolupráce', value: forma  },
      { label: 'Lokalita',         value: lok    },
      { label: 'Typ spolupráce',   value: typ    },
      { label: 'MD rate',          value: rate   },
    ].filter(r => r.value);

    if (infoRows.length === 0) {
      infoSection.style.display = 'none';
    } else {
      infoSection.style.display = '';
      infoTable.innerHTML = infoRows.map(r => `
        <tr>
          <td class="cv-info-label">${escHtml(r.label)}</td>
          <td class="cv-info-value">${escHtml(r.value)}</td>
        </tr>
      `).join('');
    }

    /* --- SKILLS SECTION --- */
    const skillsSection = document.getElementById('prev-skills-section');
    const tagsContainer = document.getElementById('prev-tags');
    const dbRow    = document.getElementById('prev-db-row');
    const dalsiRow = document.getElementById('prev-dalsi-row');
    const langRow  = document.getElementById('prev-lang-row');
    const langList = document.getElementById('prev-lang-list');

    // Tags
    const tagArr = skills.split(',').map(s => s.trim()).filter(Boolean);
    if (tagArr.length) {
      tagsContainer.innerHTML = tagArr.map(t => `<span class="cv-tag">${escHtml(t)}</span>`).join('');
      tagsContainer.style.display = 'flex';
    } else {
      tagsContainer.innerHTML = '';
      tagsContainer.style.display = 'none';
    }

    // DB
    if (db) {
      document.getElementById('prev-db-val').textContent = db;
      dbRow.style.display = '';
    } else {
      dbRow.style.display = 'none';
    }

    // Další
    if (dalsi) {
      document.getElementById('prev-dalsi-val').textContent = dalsi;
      dalsiRow.style.display = '';
    } else {
      dalsiRow.style.display = 'none';
    }

    // Languages
    const validLangs = languages.filter(l => l.name.trim());
    if (validLangs.length) {
      langList.innerHTML = validLangs.map(l => `
        <div class="cv-lang-row">
          <span class="cv-lang-name">${escHtml(l.name.trim())}</span>
          <span class="cv-lang-level">${escHtml(l.level.trim())}</span>
        </div>
      `).join('');
      langRow.style.display = '';
    } else {
      langList.innerHTML = '';
      langRow.style.display = 'none';
    }

    // Hide entire skills section if everything empty
    const skillsHasContent = tagArr.length || db || dalsi || validLangs.length;
    skillsSection.style.display = skillsHasContent ? '' : 'none';

    /* --- WORK EXPERIENCE --- */
    const workSection = document.getElementById('prev-work-section');
    const workList    = document.getElementById('prev-work-list');
    const validWork   = workItems.filter(w => w.position.trim() || w.bullets.some(b => b.text.trim()));
    if (validWork.length) {
      workList.innerHTML = validWork.map(item => {
        const bullets = item.bullets.filter(b => b.text.trim());
        const bulletsHtml = bullets.length
          ? `<ul>${bullets.map(b => `<li>${escHtml(b.text)}</li>`).join('')}</ul>`
          : '';
        return `
          <div class="cv-work-item">
            <div class="cv-work-position">${item.position.trim() ? `<span class="cv-work-position-badge">${escHtml(item.position.trim())}</span>` : ''}</div>
            <div class="cv-work-bullets">${bulletsHtml}</div>
          </div>
        `;
      }).join('');
      workSection.style.display = '';
    } else {
      workSection.style.display = 'none';
    }

    /* --- PERSONAL SKILLS --- */
    const personalSection = document.getElementById('prev-personal-section');
    const personalText    = document.getElementById('prev-personal-text');
    if (personal) {
      personalText.textContent = personal;
      personalSection.style.display = '';
    } else {
      personalSection.style.display = 'none';
    }

    /* --- EDUCATION --- */
    const eduSection = document.getElementById('prev-edu-section');
    const eduList    = document.getElementById('prev-edu-list');
    const validEdu   = eduItems.filter(e => e.years.trim() || e.institution.trim() || e.degree.trim());
    if (validEdu.length) {
      eduList.innerHTML = validEdu.map(item => `
        <div class="cv-edu-item">
          <div class="cv-edu-years">${escHtml(item.years.trim())}</div>
          <div class="cv-edu-details">
            ${item.institution.trim() ? `<div class="cv-edu-institution">${escHtml(item.institution.trim())}</div>` : ''}
            ${item.degree.trim() ? `<div class="cv-edu-degree">${escHtml(item.degree.trim())}</div>` : ''}
          </div>
        </div>
      `).join('');
      eduSection.style.display = '';
    } else {
      eduSection.style.display = 'none';
    }

    // Spusť layout algoritmus po překreslení DOM
    requestAnimationFrame(computePrintLayout);
  }

  /* ============================================================
     POMOCNÁ FUNKCE — výška A4 stránky v px
  ============================================================ */
  function getA4HeightPx() {
    const ruler = document.createElement('div');
    ruler.style.cssText = 'position:absolute;height:297mm;width:1px;visibility:hidden;pointer-events:none;';
    document.body.appendChild(ruler);
    const h = ruler.offsetHeight;
    document.body.removeChild(ruler);
    return h;
  }

  /* ============================================================
     PRINT LAYOUT ALGORITMUS
     ─────────────────────────────────────────────────────────────
     Tři typy prvků:

     1. JOB ITEM (.cv-work-item) — NEDĚLITELNÝ
        Pokud se nevejde na aktuální stránku → jde na novou stránku
        jako součást nového vizuálního segmentu.

     2. WORK SECTION — DĚLITELNÁ (segmentovaná)
        JS rozdělí sekci na N samostatných .cv-section divů.
        Každý segment = plnohodnotný box s rounded corners na VŠECH
        4 stranách. Žádný "ostrý řez" na konci stránky.

     3. OSTATNÍ SEKCE (info, skills, personal, edu) — ATOMICKÉ
        Celá sekce se přesune na novou stránku pokud se nevejde.
     ─────────────────────────────────────────────────────────────
     Pseudologika:
       if (block.height <= remainingPageHeight) → render(block)
       else → newPage(); render(block)
  ============================================================ */
  function computePrintLayout() {
    const preview = document.getElementById('preview');
    const workSec = document.getElementById('prev-work-section');

    // ── 1. Reset ──────────────────────────────────────────────────
    // Odstraň předchozí segmenty pracovní sekce
    preview.querySelectorAll('[data-work-segment]').forEach(el => el.remove());

    // Obnov pracovní sekci pokud byla schovaná kvůli segmentaci
    if (workSec.hasAttribute('data-segmented')) {
      workSec.style.display = '';
      workSec.removeAttribute('data-segmented');
    }

    // Vymaž vynucené page breaks na atomických sekcích
    preview.querySelectorAll('[data-forced-break]').forEach(el => {
      el.style.breakBefore     = '';
      el.style.pageBreakBefore = '';
      el.removeAttribute('data-forced-break');
    });
    preview.querySelectorAll('.page-break-line').forEach(el => el.remove());

    void preview.offsetHeight; // vynutit reflow pro přesné míry

    // ── 2. Konstanty ──────────────────────────────────────────────
    const a4H     = getA4HeightPx();
    const PAD_TOP = 32;   // @page margin-top = bílá mezera nahoře na každé stránce
    const PAD_BOT = 80;   // footer (~48px) + 32px mezera dole
    const USABLE  = a4H - PAD_TOP - PAD_BOT; // použitelná výška obsahu na stránku
    const SEC_PAD = 14;   // .cv-section padding-top = padding-bottom
    const SEC_MB  = 12;   // .cv-section margin-bottom

    const screenPadTop = parseFloat(window.getComputedStyle(preview).paddingTop) || 28;
    const previewTop   = preview.getBoundingClientRect().top;

    function printY(el) {
      return el.getBoundingClientRect().top - previewTop - screenPadTop;
    }
    function isVisible(el) {
      return el && el.style.display !== 'none' && el.offsetHeight > 0;
    }
    function forceBreakBefore(el) {
      el.style.breakBefore     = 'page';
      el.style.pageBreakBefore = 'always';
      el.setAttribute('data-forced-break', '1');
    }

    // ── 3. Identifikuj sekce ──────────────────────────────────────
    const infoSec     = document.getElementById('prev-info-section');
    const skillsSec   = document.getElementById('prev-skills-section');
    const personalSec = document.getElementById('prev-personal-section');
    const eduSec      = document.getElementById('prev-edu-section');

    const orderedSections = [infoSec, skillsSec, workSec, personalSec, eduSec];
    const firstVisible    = orderedSections.find(s => isVisible(s));
    if (!firstVisible) {
      drawPageBreakLines(a4H, preview);
      return;
    }

    // usedOnPage = výška obsahu nad první sekcí (header + margin)
    let usedOnPage = Math.max(0, printY(firstVisible));

    // ── 4. Zpracuj sekce v pořadí dokumentu ──────────────────────
    orderedSections.forEach(sec => {
      if (!isVisible(sec)) return;

      const secMb = parseFloat(window.getComputedStyle(sec).marginBottom) || SEC_MB;
      const secH  = sec.offsetHeight;

      if (sec.id === 'prev-work-section') {
        /* ── DĚLITELNÁ SEKCE: Pracovní zkušenosti ──────────────────
           Rozdělíme sekci na samostatné vizuální segmenty.
           Každý segment = .cv-section div s plnými rounded corners.
           ─────────────────────────────────────────────────────── */

        const titleEl = sec.querySelector('.cv-section-title');
        const titleH  = titleEl
          ? titleEl.offsetHeight + (parseFloat(window.getComputedStyle(titleEl).marginBottom) || 12)
          : 0;

        const items = [...sec.querySelectorAll('.cv-work-item')];

        // Zahrni prostor pro padding + nadpis sekce na první stránce
        usedOnPage += SEC_PAD + titleH;

        // Rozhodni, které položky patří na kterou stránku
        // segments[i] = pole .cv-work-item elementů pro stránku i
        const segments = [[]];

        items.forEach(item => {
          const itemH  = item.offsetHeight;
          const itemMb = parseFloat(window.getComputedStyle(item).marginBottom) || 0;
          const total  = itemH + itemMb;

          // + SEC_PAD rezervuje místo pro spodní padding segmentu (14px).
          // Bez toho by segment div překročil USABLE a byl by oříznutý.
          if (usedOnPage + itemH + SEC_PAD > USABLE) {
            // Položka se nevejde → nový segment = nová stránka
            segments.push([item]);
            // Na nové stránce: padding-top nového segmentu (SEC_PAD) + položka
            usedOnPage = SEC_PAD + total;
          } else {
            segments[segments.length - 1].push(item);
            usedOnPage += total;
          }
        });

        // Uzavření sekce: padding-bottom + margin-bottom
        usedOnPage += SEC_PAD + secMb;

        // ── Vytvoř vizuální segment divy ─────────────────────────
        // Každý segment = nový .cv-section box s border-radius na všech stranách.
        // Prázdné segmenty přeskočíme — nadpis patří vždy k prvnímu neprázdnému.
        if (segments.length > 1) {
          // Skryj původní sekci — nahradíme ji segmenty
          sec.style.display = 'none';
          sec.setAttribute('data-segmented', '1');

          let insertAfter = sec;

          // Index prvního neprázdného segmentu → sem patří nadpis sekce
          const firstFilledIdx = segments.findIndex(s => s.length > 0);

          segments.forEach((segItems, idx) => {
            if (segItems.length === 0) return; // přeskoč prázdné segmenty

            const segDiv = document.createElement('div');
            segDiv.className = 'cv-section';
            segDiv.setAttribute('data-work-segment', idx);

            // Nadpis sekce patří do prvního neprázdného segmentu
            // (může to být i segment[1] pokud segment[0] byl prázdný)
            if (idx === firstFilledIdx && titleEl) {
              segDiv.appendChild(titleEl.cloneNode(true));
            }

            // Klony položek do segmentu
            segItems.forEach(item => segDiv.appendChild(item.cloneNode(true)));

            // Segmenty s idx > 0 začínají na nové stránce
            // (platí i pro segment[1] pokud byl segment[0] prázdný)
            if (idx > 0) {
              segDiv.style.breakBefore     = 'page';
              segDiv.style.pageBreakBefore = 'always';
            }

            insertAfter.parentNode.insertBefore(segDiv, insertAfter.nextSibling);
            insertAfter = segDiv;
          });
        }
        // Pokud segments.length === 1 → vše se vešlo na jednu stránku,
        // původní sekce zůstane beze změny.

      } else {
        /* ── ATOMICKÁ SEKCE ─────────────────────────────────────────
           Celá sekce je nedělitelná jednotka.
           Pokud se nevejde na aktuální stránku → přesuň CELOU na novou.
        ───────────────────────────────────────────────────────── */
        if (usedOnPage + secH > USABLE) {
          forceBreakBefore(sec);
          usedOnPage = secH + secMb;
        } else {
          usedOnPage += secH + secMb;
        }
      }
    });

    // ── 5. Překresli vizuální indikátory stránek v preview ────────
    requestAnimationFrame(() => drawPageBreakLines(a4H, preview));
  }

  /* ============================================================
     VIZUÁLNÍ INDIKÁTOR STRÁNEK v preview
  ============================================================ */
  function drawPageBreakLines(a4H, preview) {
    preview.querySelectorAll('.page-break-line').forEach(el => el.remove());
    const totalH = preview.scrollHeight;
    let page = 1;
    while (page * a4H < totalH) {
      const line = document.createElement('div');
      line.className = 'page-break-line';
      line.style.top  = (page * a4H) + 'px';
      preview.appendChild(line);
      page++;
    }
  }

  /* ============================================================
     PDF EXPORT — window.print()
  ============================================================ */
  document.getElementById('btn-export').addEventListener('click', () => {
    window.print();
  });

  /* ============================================================
     INIT — render empty state
  ============================================================ */
  updatePreview();
</script>
</body>
</html>
